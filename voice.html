    <p>Voice Mode allows you to hear Tekoan phrases spoken aloud using Text‑to‑Speech (TTS). 
       Enter text below and click “Speak” to listen.</p>

    <section>
      <textarea id="voiceInput" placeholder="Enter text to speak..."></textarea>
